name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      run_ci: >-
        ${{ (github.event_name == 'pull_request' && steps.changes.outputs.scripts == 'true') ||
         github.event_name == 'workflow_dispatch' ||
         (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')) }}
    steps:
      - name: Checkout code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        name: detect changes
        if: github.event_name == 'pull_request'
        id: changes
        with:
          filters: |
            scripts:
              - 'scripts/**'

  test-scripts:
    permissions:
      contents: read

    needs: detect-changes
    if: needs.detect-changes.outputs.run_ci == 'true'

    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: scripts/supplier-register/
        run: npm ci --ignore-scripts

      - name: Run Tests and Generate Reports
        working-directory: scripts/supplier-register/
        run: |
          # Create output directory
          mkdir -p ../../test-results
          
          # Run tests and generate coverage reports (assuming jest-like environment)
          node --test --experimental-test-coverage \
            --test-reporter=spec \
            --test-reporter=junit \
            --test-reporter=lcov \
            --test-reporter-destination=stdout \
            --test-reporter-destination=junit.xml \
            --test-reporter-destination=lcov.info \
            -- *.test.js

          # Copy outputs and gracefully handle if tests don't produce them out of the box
          cp lcov.info ../../test-results/lcov.info || true
          cp junit.xml ../../test-results/test-results.xml || true

      - name: Upload test reports
        if: success() || failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-report
          path: test-results/

  publish-results:
    permissions:
      contents: read
      security-events: write

    needs:
      - test-scripts

    if: always()

    name: Publish Reports
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*-report'
          path: test-results
          merge-multiple: true

      - name: Detect reports exist
        id: results-check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const args = [];

            const hasUnit = fs.existsSync('test-results/test-results.xml');
            const hasCoverage = fs.existsSync('test-results/lcov.info');

            core.setOutput('unit-reports', hasUnit);
            core.setOutput('coverage-reports', hasCoverage);

            // Check for coverage report
            if (hasCoverage) {
              args.push('-Dsonar.javascript.lcov.reportPaths=test-results/lcov.info');
            }

            // Join with spaces and set as output
            core.setOutput('sonar-args', args.join(' '));

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            ${{ steps.results-check.outputs.sonar-args }}

      - name: Publish Test Results
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f # v2.6.0
        if: |
          always() &&
          steps.results-check.outputs.unit-reports == 'true'
        with:
          name: OPA Test Results
          path: 'test-results/*.xml'
          reporter: jest-junit
