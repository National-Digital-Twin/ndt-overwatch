name: Generate Suppliers Register

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-register:
    runs-on: ubuntu-latest
    steps:

      - name: 'Checkout ${{ github.event.repository.name }} repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate Write Token
        id: write-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.NDTP_REPOSITORY_WRITER_APP_CLIENT_ID }}
          private-key: ${{ secrets.NDTP_REPOSITORY_WRITER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            .github
          permission-contents: write

      - name: Checkout .github repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: '${{ github.repository_owner }}/.github'
          token: ${{ steps.write-token.outputs.token }}
          ref: main
          path: dot-github

      - name: Configure Git
        working-directory: dot-github
        env:
          GITHUB_APP_USERNAME: '${{ steps.write-token.outputs.app-slug }}[bot]'
          GITHUB_APP_EMAIL: '${{ steps.write-token.outputs.user-id }}+${{ steps.write-token.outputs.app-slug }}[bot]@users.noreply.github.com'
        run: |
          git config user.name "$GITHUB_APP_USERNAME"
          git config user.email "$GITHUB_APP_EMAIL"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Install dependencies
        # workspace is automatically set to the root folder of the last checked-out repository
        # which in this case is ntd-overwatch
        working-directory: 'scripts/supplier-register/'
        run: npm ci --ignore-scripts

      - name: Generate Register
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          SCRIPT_DIR: 'scripts/supplier-register/'
          REGISTER_PATH: 'dot-github/profile/ndtp-suppliers-register.md'
        with:
          script: |
            const path = require('node:path');

            // Change to script directory for execution
            process.chdir(path.join(process.env.GITHUB_WORKSPACE, process.env.SCRIPT_DIR));

            const generate = require('./generate-register.js');
            const { marked } = require('marked');
            const outputPath = path.join(process.env.GITHUB_WORKSPACE, process.env.REGISTER_PATH);

            await generate({ github, context, core, marked, outputPath });

      - name: Commit and Push changes
        working-directory: dot-github
        run: |
          # Only commit and push if there are changes to the file
          if [ -n "$(git status --porcelain profile/ndtp-suppliers-register.md)" ]; then
            echo "Changes detected, committing and pushing to main branch."
            git add profile/ndtp-suppliers-register.md
            git commit -m "docs(register): Automated update of supplier register"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi

      - name: Upload Register Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ndtp-suppliers-register
          path: dot-github/profile/ndtp-suppliers-register.md
          if-no-files-found: ignore

